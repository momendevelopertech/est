name: Main Quality Gate

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  quality-gate:
    name: Typecheck, Lint, Build, Integration, Audit
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: examops_ci
          POSTGRES_USER: examops
          POSTGRES_PASSWORD: examops
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U examops -d examops_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://examops:examops@127.0.0.1:5432/examops_ci?schema=public
      DIRECT_DATABASE_URL: postgresql://examops:examops@127.0.0.1:5432/examops_ci?schema=public
      AUTH_SECRET: ci-auth-secret-change-before-production
      NEXTAUTH_URL: http://127.0.0.1:4010
      SEED_APP_USERS_PASSWORD: ChangeMe123!
      EXAMOPS_ADMIN_PASSWORD: ChangeMe123!
      EXAMOPS_VIEWER_PASSWORD: ChangeMe123!
      EXAMOPS_BASE_URL: http://127.0.0.1:4010

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare database schema
        run: |
          npm run db:generate
          npm run db:deploy
          npm run db:seed

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Integration suites
        run: npm run test:integration

      - name: Production audit verification
        run: node tmp/verify-production-audit.mjs
